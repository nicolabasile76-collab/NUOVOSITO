<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POST — Dal campo | Archivio</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Public+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#006172;--ink-deep:#003d4a;--ink-light:#2b7a8c;--cream:#f7f5f0;--warm-white:#fefcf8;--stone:#e8e4dd;--slate:#6b7280;--charcoal:#1a1a1a;--charcoal-90:#273141;--teal-glow:#88d1e5;--teal-wash:rgba(0,97,114,.04)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Atkinson Hyperlegible',sans-serif;background:var(--cream);color:var(--charcoal);line-height:1.6}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
h1,h2,h3,h4{font-family:'Public Sans','Atkinson Hyperlegible',sans-serif}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
a{color:inherit;text-decoration:none}
.marker{display:inline-flex;align-items:center;gap:.5rem;font-family:Public Sans,sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);padding:.35rem .75rem;border:1.5px solid var(--ink);border-radius:100px}
.rule{border:none;border-top:1px solid var(--stone);margin:0}
/* Blog card */
.blog-card{border-radius:12px;overflow:hidden;transition:transform .35s cubic-bezier(.19,1,.22,1),box-shadow .35s ease;cursor:pointer}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.06)}
.blog-card img{transition:transform .6s ease}.blog-card:hover img{transform:scale(1.04)}
/* List row */
.list-row{display:grid;grid-template-columns:100px 100px 1fr 140px;gap:1.5rem;align-items:center;padding:1rem 0;border-bottom:1px solid var(--stone);transition:background .2s;cursor:pointer}
.list-row:hover{background:var(--teal-wash)}
@media(max-width:768px){.list-row{grid-template-columns:1fr;gap:.25rem;padding:1rem 0}.hide-sm{display:none!important}.col-sm{grid-template-columns:1fr!important}}
/* Filter button */
.bf{padding:.4rem 1rem;border-radius:100px;border:1.5px solid var(--stone);background:transparent;color:var(--slate);font-family:Public Sans,sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:.2s}
.bf.active{background:var(--ink);color:white;border-color:var(--ink)}
/* View toggle */
.view-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--stone);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--slate);transition:.2s}
.view-btn.active{background:var(--ink);color:white;border-color:var(--ink)}
</style>
</head>
<body>

<!-- NAV -->
<header style="position:fixed;top:0;width:100%;z-index:100;background:rgba(247,245,240,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--stone)">
  <nav style="max-width:1200px;margin:0 auto;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center">
    <a href="./index.html"><img src="./logo-post.png" alt="POST" style="height:60px;width:auto" onerror="this.outerHTML='<span style=\'font-family:Public Sans;font-size:2rem;color:var(--ink);font-weight:800\'>POST</span>'"/></a>
    <div class="hide-sm" style="display:flex;align-items:center;gap:2rem;font-family:Public Sans,sans-serif;font-size:.9rem;font-weight:500">
      <a href="./index.html#pilastri" style="color:var(--slate)">Cosa facciamo</a>
      <a href="./piani-di-zona.html" style="color:var(--slate)">Piani di Zona</a>
      <a href="./blog.html" style="color:var(--ink);font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:2px">Dal campo</a>
      <a href="./wait.html" style="color:var(--slate)"><span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle;margin-right:2px">neurology</span>AI per il Bene Comune</a>
      <a href="./index.html#chi-siamo" style="color:var(--slate)">Chi siamo</a>
    </div>
    <a href="./index.html#contatti" style="background:var(--ink);color:white;padding:.6rem 1.5rem;border-radius:8px;font-family:Public Sans,sans-serif;font-weight:700;font-size:.85rem">Contatti</a>
  </nav>
</header>

<main style="padding:7rem 2rem 4rem;max-width:1200px;margin:0 auto">

  <!-- Header -->
  <nav style="margin-bottom:2rem">
    <a href="./index.html" style="font-size:.85rem;color:var(--slate)">Home</a>
    <span style="font-size:.85rem;color:var(--stone);margin:0 .5rem">/</span>
    <span style="font-size:.85rem;color:var(--ink);font-weight:700">Dal campo</span>
  </nav>

  <div style="margin-bottom:3rem">
    <h1 style="font-size:clamp(2.5rem,5vw,4rem);color:var(--ink);letter-spacing:-.03em;margin-bottom:1rem">Dal campo.</h1>
    <p style="font-size:1.15rem;color:var(--slate);max-width:550px">Progetti, riflessioni metodologiche e aggiornamenti normativi. Il nostro lavoro raccontato mentre succede.</p>
  </div>

  <!-- Filters + View toggle -->
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--stone)">
    <div id="filters" style="display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="bf active" data-cat="all">Tutti</button>
      <button class="bf" data-cat="case-study">Case study</button>
      <button class="bf" data-cat="normativa">Normativa</button>
      <button class="bf" data-cat="metodo">Metodo</button>
      <button class="bf" data-cat="ai">AI</button>
    </div>
    <div style="display:flex;gap:.5rem">
      <button class="view-btn active" id="view-grid" title="Griglia"><span class="material-symbols-outlined" style="font-size:18px">grid_view</span></button>
      <button class="view-btn" id="view-list" title="Lista"><span class="material-symbols-outlined" style="font-size:18px">view_list</span></button>
    </div>
  </div>

  <!-- Content area -->
  <div id="content"></div>

</main>

<!-- FOOTER -->
<footer style="background:var(--charcoal);padding:3rem 2rem;border-top:1px solid rgba(255,255,255,.08)">
  <div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.5rem">
    <div style="display:flex;align-items:center;gap:2rem">
      <img src="./logo-post.png" alt="POST" style="height:40px;width:auto;filter:brightness(0) invert(1);opacity:.6" onerror="this.outerHTML='<span style=\'font-family:Public Sans;font-size:1.5rem;color:rgba(255,255,255,.6);font-weight:800\'>POST</span>'"/>
      <span style="font-size:.8rem;color:rgba(255,255,255,.4)">&copy; 2025 POST Società Benefit S.r.l. — Milano</span>
    </div>
    <div style="display:flex;gap:2rem;font-size:.8rem">
      <a href="#" style="color:rgba(255,255,255,.4)">Privacy</a>
      <a href="#" style="color:rgba(255,255,255,.4)">Cookie</a>
      <a href="https://www.linkedin.com/company/105770276" target="_blank" style="color:rgba(255,255,255,.4)">LinkedIn</a>
    </div>
  </div>
</footer>

<script>
let allPosts=[];
let currentView='grid';
let currentCat='all';

async function init(){
  try{const r=await fetch('/data/blog.json');allPosts=await r.json()}catch(e){return}
  allPosts.sort((a,b)=>new Date(b.date)-new Date(a.date));
  render();

  // Filters
  document.querySelectorAll('.bf').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.bf').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentCat=btn.dataset.cat;
      render();
    };
  });

  // View toggle
  document.getElementById('view-grid').onclick=()=>{currentView='grid';updateViewBtns();render()};
  document.getElementById('view-list').onclick=()=>{currentView='list';updateViewBtns();render()};
}

function updateViewBtns(){
  document.getElementById('view-grid').classList.toggle('active',currentView==='grid');
  document.getElementById('view-list').classList.toggle('active',currentView==='list');
}

function getSlug(p){
  return p.url||`./articolo.html?slug=${p.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'')}`;
}

function render(){
  const posts=currentCat==='all'?allPosts:allPosts.filter(p=>p.cat===currentCat);
  const el=document.getElementById('content');

  if(currentView==='grid'){
    el.innerHTML='';
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem';
    grid.className='col-sm';

    posts.forEach((p,i)=>{
      const d=new Date(p.date).toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});
      const slug=getSlug(p);
      const card=document.createElement('a');card.href=slug;

      if(p.highlight){
        card.className='blog-card';
        card.style.cssText='grid-column:span 3;display:grid;grid-template-columns:1fr 2fr;background:var(--ink);color:white;border-radius:12px;overflow:hidden';
        card.innerHTML=`<div style="height:100%;min-height:220px"><img src="${p.img}" alt="" style="width:100%;height:100%;object-fit:cover"/></div>
          <div style="padding:2rem;display:flex;flex-direction:column;justify-content:center">
            <div style="display:flex;gap:.75rem;align-items:center;margin-bottom:.75rem"><span class="marker" style="border-color:rgba(255,255,255,.3);color:var(--teal-glow)">${p.catLabel}</span><span style="font-size:.8rem;opacity:.6">${d}</span></div>
            <h3 style="font-size:1.4rem;margin-bottom:.5rem;line-height:1.2">${p.title}</h3>
            <p style="opacity:.8;line-height:1.6;font-size:.9rem">${p.excerpt}</p>
            <div style="margin-top:1rem;display:flex;justify-content:space-between;align-items:center"><span style="font-size:.8rem;opacity:.6">${p.author}</span><span style="font-weight:700;font-size:.85rem;color:var(--teal-glow);display:flex;align-items:center;gap:.3rem">Leggi <span class="material-symbols-outlined" style="font-size:14px">arrow_forward</span></span></div>
          </div>`;
      } else {
        card.className='blog-card';
        card.style.cssText='background:var(--cream);border:1px solid var(--stone)';
        card.innerHTML=`<div style="height:180px;overflow:hidden"><img src="${p.img}" alt="" style="width:100%;height:100%;object-fit:cover"/></div>
          <div style="padding:1.5rem">
            <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem"><span class="marker" style="font-size:.7rem;padding:.25rem .6rem">${p.catLabel}</span><span style="font-size:.75rem;color:var(--slate)">${d}</span></div>
            <h4 style="font-size:1.1rem;color:var(--ink);margin-bottom:.4rem;line-height:1.3">${p.title}</h4>
            <p style="font-size:.85rem;color:var(--slate);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${p.excerpt}</p>
            <div style="margin-top:.75rem;display:flex;justify-content:space-between;align-items:center"><span style="font-size:.75rem;color:var(--slate)">${p.author}</span><span style="font-weight:700;font-size:.8rem;color:var(--ink);display:flex;align-items:center;gap:.2rem">Leggi <span class="material-symbols-outlined" style="font-size:14px">arrow_forward</span></span></div>
          </div>`;
      }
      grid.appendChild(card);
    });
    el.appendChild(grid);

  } else {
    // List view
    el.innerHTML='';
    // Header
    const header=document.createElement('div');
    header.className='list-row hide-sm';
    header.style.cssText='border-bottom:2px solid var(--ink);padding:.5rem 0;font-family:Public Sans,sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);cursor:default';
    header.innerHTML='<span>Data</span><span>Categoria</span><span>Titolo</span><span>Autore</span>';
    el.appendChild(header);

    posts.forEach(p=>{
      const d=new Date(p.date).toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});
      const slug=getSlug(p);
      const row=document.createElement('a');
      row.href=slug;
      row.className='list-row';
      row.innerHTML=`
        <span style="font-size:.85rem;color:var(--slate)">${d}</span>
        <span><span class="marker" style="font-size:.65rem;padding:.2rem .5rem">${p.catLabel}</span></span>
        <span style="font-weight:700;color:var(--ink);font-size:1rem">${p.title}</span>
        <span style="font-size:.85rem;color:var(--slate);text-align:right">${p.author}</span>`;
      el.appendChild(row);
    });
  }

  // Count
  const countEl=document.getElementById('post-count');
  if(countEl)countEl.textContent=posts.length;
}

init();
</script>
</body>
</html>
